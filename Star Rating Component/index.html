<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Star Rating Feedback</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <!-- Rating Card -->
        <div class="rating-card" id="ratingCard">
            <h2 class="title">How was your experience?</h2>
            <p class="subtitle">We'd love to hear your feedback</p>

            <!-- Stars Container -->
            <div class="stars" id="starsContainer">
                <svg class="star" data-rating="1" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"
                        stroke="#D1D5DB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <svg class="star" data-rating="2" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"
                        stroke="#D1D5DB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <svg class="star" data-rating="3" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"
                        stroke="#D1D5DB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <svg class="star" data-rating="4" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"
                        stroke="#D1D5DB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <svg class="star" data-rating="5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"
                        stroke="#D1D5DB" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </div>

            <!-- Click to Rate Text -->
            <p class="rating-text" id="ratingText">Click to rate</p>

            <!-- Submit Button -->
            <button class="submit-btn" id="submitBtn" disabled>Submit Rating</button>
        </div>

        <!-- Success Card (Hidden by default) -->
        <div class="success-card hidden" id="successCard">
            <div class="success-icon">
                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" fill="#10B981" />
                    <path d="M8 12L11 15L16 9" stroke="white" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </div>
            <h2 class="success-title">Thank you for your feedback!</h2>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
