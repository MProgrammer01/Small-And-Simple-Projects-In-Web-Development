<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expanding Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="gallery-container">

        <!-- Panel 1 -->
        <div class="gallery-panel">
            <img src="https://plus.unsplash.com/premium_photo-1723291283185-8b22a1efb35d?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                 alt="Mountain View">
            <span class="panel-label">Mountain View</span>
            <span class="side-panel-label">Mountain</span>
        </div>

        <!-- Panel 2 — expanded by default -->
        <div class="gallery-panel expanded">
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200"
                 alt="Ocean View">
            <span class="panel-label">Ocean View</span>
            <span class="side-panel-label">Ocean</span>
        </div>

        <!-- Panel 3 -->
        <div class="gallery-panel">
            <img src="https://plus.unsplash.com/premium_photo-1661883809211-eb59f508b3d9?q=80&w=870&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                 alt="Waterfall">
            <span class="panel-label">Waterfall</span>
            <span class="side-panel-label">Waterfall</span>
        </div>

        <!-- Panel 4 -->
        <div class="gallery-panel">
            <img src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=800"
                 alt="Lake View">
            <span class="panel-label">Lake View</span>
            <span class="side-panel-label">Lake</span>
        </div>

        <!-- Panel 5 -->
        <div class="gallery-panel">
            <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=800"
                 alt="Forest Path">
            <span class="panel-label">Forest Path</span>
            <span class="side-panel-label">Forest</span>
        </div>

    </div>
    <script src="script.js"></script>
</body>
</html>
