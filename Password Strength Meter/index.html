<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>Create Account</h1>
        <p class="subtitle">Join us today</p>

        <form id="signupForm" autocomplete="off">
            <!-- Name Row -->
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" placeholder="John" id="firstName" />
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" placeholder="Doe" id="lastName" />
                </div>
            </div>

            <!-- Email -->
            <div class="form-group full-width">
                <label>Email</label>
                <input type="email" placeholder="john@gmail.com" id="email" />
            </div>

            <!-- Password -->
            <div class="form-group full-width">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" placeholder="Enter your password" id="password" />
                    <button type="button" class="toggle-password" id="togglePassword">👁️</button>
                </div>

                <!-- Strength Bar -->
                <div class="strength-bar-container">
                    <div class="strength-bar" id="strengthBar"></div>
                </div>

                <div class="strength-label">
                    <span class="strength-text" id="strengthText"></span>
                    <span class="strength-percentage" id="strengthPercentage"></span>
                </div>

                <!-- Criteria Badges -->
                <div class="criteria-grid" id="criteriaGrid">
                    <div class="criteria-badge not-met" data-criteria="length">
                        <span class="icon">○</span> 8+ characters
                    </div>
                    <div class="criteria-badge not-met" data-criteria="lowercase">
                        <span class="icon">○</span> Lowercase
                    </div>
                    <div class="criteria-badge not-met" data-criteria="uppercase">
                        <span class="icon">○</span> Uppercase
                    </div>
                    <div class="criteria-badge not-met" data-criteria="number">
                        <span class="icon">○</span> Number
                    </div>
                    <div class="criteria-badge not-met" data-criteria="special">
                        <span class="icon">○</span> Special char
                    </div>
                </div>
            </div>

            <!-- Create Button -->
            <button type="submit" class="create-btn">Create Account</button>
        </form>

        <!-- Sign In Link -->
        <p class="signin-section">
            Already have an account? <a href="#">Sign in</a>
        </p>
    </div>

    <script src="script.js"></script>
</body>
</html>
