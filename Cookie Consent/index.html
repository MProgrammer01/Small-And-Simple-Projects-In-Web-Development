<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Consent Banner</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Main Content -->
    <div class="main-content">
        <div class="content-wrapper">
            <h1 class="main-title">Welcome to Our Website</h1>
            <p class="main-subtitle">This is a demo page to show the cookie consent banner.</p>
            <button class="reset-btn" id="resetBtn">Reset Cookie Preference</button>
        </div>
    </div>

    <!-- Cookie Consent Banner -->
    <div class="cookie-banner" id="cookieBanner">
        <div class="cookie-content">
            <div class="cookie-icon">🍪</div>
            <div class="cookie-text">
                <h3 class="cookie-title">We use cookies</h3>
                <p class="cookie-description">We use cookies to improve your experience and analyze site traffic. By clicking "Accept", you consent to our use of cookies.</p>
            </div>
        </div>
        <div class="cookie-buttons">
            <button class="btn btn-decline" id="declineBtn">Decline</button>
            <button class="btn btn-accept" id="acceptBtn">Accept All</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
