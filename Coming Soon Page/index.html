<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MProgrammer - Coming Soon</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <!-- Logo -->
            <div class="logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M13 2L3 14h8l-1 8 10-12h-8l1-8z" fill="currentColor" />
                    </svg>
                </div>
                <span class="logo-text">MProgrammer</span>
            </div>

            <!-- Badge -->
            <div class="badge">
                <svg class="badge-icon" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                    <path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                </svg>
                <span>Coming Soon</span>
            </div>
        </div>

        <!-- Main Content -->
        <h1 class="title">Something awesome<br>is brewing.</h1>
        <p class="description">We're working hard to bring you something special.<br>Be the first to know when we
            launch.</p>

        <!-- Countdown Timer -->
        <div class="countdown">
            <div class="time-box">
                <div class="time-value" id="days">05</div>
                <div class="time-label">DAYS</div>
            </div>
            <div class="separator">:</div>
            <div class="time-box">
                <div class="time-value" id="hours">21</div>
                <div class="time-label">HOURS</div>
            </div>
            <div class="separator">:</div>
            <div class="time-box">
                <div class="time-value" id="minutes">00</div>
                <div class="time-label">MINUTES</div>
            </div>
            <div class="separator">:</div>
            <div class="time-box">
                <div class="time-value" id="seconds">48</div>
                <div class="time-label">SECONDS</div>
            </div>
        </div>

        <!-- Email Subscription Form -->
        <form class="email-form" id="emailForm">
            <div class="input-wrapper">
                <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M4 4H20C21.1 4 22 4.9 22 6V18C22 19.1 21.1 20 20 20H4C2.9 20 2 19.1 2 18V6C2 4.9 2.9 4 4 4Z"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                    <path d="M22 6L12 13L2 6" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
                <input type="email" class="email-input" id="emailInput" placeholder="Enter your email" required>
            </div>
            <button type="submit" class="notify-btn">
                Notify Me
                <svg class="arrow-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    xmlns="http://www.w3.org/2000/svg">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </button>
        </form>

        <!-- Success Message -->
        <div class="success-message" id="successMessage">
            <svg class="check-icon" width="20" height="20" viewBox="0 0 24 24" fill="none"
                xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2" />
                <path d="M8 12l2 2 4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            <span>You're on the list! We'll notify you when we launch.</span>
        </div>

        <!-- Social Links -->
        <div class="social-links">
            <a href="#" class="social-link" aria-label="Twitter">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z" />
                </svg>
            </a>
            <a href="#" class="social-link" aria-label="Instagram">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
                    <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                    <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
                </svg>
            </a>
            <a href="#" class="social-link" aria-label="Dribbble">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <path
                        d="M8.56 2.75c4.37 6.03 6.02 9.42 8.03 17.72m2.54-15.38c-3.72 4.35-8.94 5.66-16.88 5.85m19.5 1.9c-3.5-.93-6.63-.82-8.94 0-2.58.92-5.01 2.86-7.44 6.32" />
                </svg>
            </a>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
