<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>QR Code Generator</h1>
        <p class="subtitle">Enter text or URL to generate QR code</p>

        <!-- Input -->
        <div class="input-section">
            <textarea id="qrInput" placeholder="Enter text or URL here..."></textarea>
        </div>

        <!-- Size Selector -->
        <div class="options-row">
            <label>Size:</label>
            <select class="size-select" id="sizeSelect">
                <option value="150">150×150</option>
                <option value="200">200×200</option>
                <option value="250">250×250</option>
                <option value="300" selected>300×300</option>
                <option value="400">400×400</option>
                <option value="500">500×500</option>
            </select>
        </div>

        <!-- Generate Button -->
        <button class="generate-btn" id="generateBtn">Generate QR Code</button>

        <!-- Error Message -->
        <p class="error-msg" id="errorMsg">️ Please enter some text or URL!</p>

        <!-- Loading -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
        </div>

        <!-- QR Result -->
        <div class="qr-result" id="qrResult">
            <div class="qr-code-wrapper">
                <img id="qrImage" alt="QR Code" />
            </div>
            <br>
            <button class="download-btn" id="downloadBtn">
                 Download QR Code
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
